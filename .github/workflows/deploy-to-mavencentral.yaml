name: maven central 배포
on:
  workflow_call:
    secrets:
      GPG_SECRET:
        required: true
      GPG_PASSPHRASE:
        required: true
      MAVEN_CENTRAL_USERNAME:
        required: true
      MAVEN_CENTRAL_PASSWORD:
        required: true
jobs:
  publish-to-mavencentral:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Github Repository
        uses: actions/checkout@v6
      - name: Install JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '21'
      - name: Prepare Gradle Addon
        uses: gradle/gradle-build-action@v3
      - name: Build Project
        run: |
          chmod +x gradlew
          ./gradlew --stacktrace build
      - name: Publish to Maven Central
        env:
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          export GPG_TTY=$(tty)
          echo "gpg.secret=$GPG_SECRET" >> gradle.properties
          echo "gpg.passphrase=$GPG_PASSPHRASE" >> gradle.properties
          echo "mavenCentralUsername=$MAVEN_CENTRAL_USERNAME" >> gradle.properties
          echo "mavenCentralPassword=$MAVEN_CENTRAL_PASSWORD" >> gradle.properties
          ./gradlew --stacktrace kooma-core:publish