name: Release New Kooma

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'adopt'
          java-version: '25'
      - name: Prepare Gradle
        uses: gradle/gradle-build-action@v3
      - name: Build and Publish to Maven Central
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.REPOSITORY_PAT }}
          GPG_PUBLIC: ${{ secrets.GPG_PUBLIC }}
          GPG_SECRET: ${{ secrets.GPG_SECRET }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          export GPG_TTY=$(tty)
          mkdir ~/.jreleaser
          echo "JRELEASER_MAVENCENTRAL_USERNAME=\"$MAVEN_CENTRAL_USERNAME\"\n" >> .jreleaser/config.toml
          echo "JRELEASER_MAVENCENTRAL_PASSWORD=\"$MAVEN_CENTRAL_PASSWORD\"\n" >> .jreleaser/config.toml
          echo "JRELEASER_GPG_PASSPHRASE="$GPG_PASSPHRASE"\n" >> .jreleaser/config.toml
          echo "JRELEASER_GPG_PUBLIC_KEY=\"\"\"$GPG_PUBLIC\"\"\"\n" >> .jreleaser/config.toml
          echo "JRELEASER_GPG_SECRET_KEY=\"\"\"$GPG_SECRET\"\"\"\n" >> .jreleaser/config.toml
          
          ./graledw --stacktrace jreleaserConfig
          ./gradlew --stacktrace clean
          ./gradlew --stacktrace build
          ./gradlew --stacktrace publish
          ./gradlew --stacktrace jreleaserFullRelease
          

